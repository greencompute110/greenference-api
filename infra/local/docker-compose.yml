services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: greenference
      POSTGRES_USER: greenference
      POSTGRES_PASSWORD: greenference
    ports:
      - "${GREENCOMPUTE_LOCAL_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenference -d greenference"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports:
      - "${GREENCOMPUTE_LOCAL_REDIS_PORT:-16379}:6379"
  nats:
    image: nats:2.10
    command: ["-js", "-m", "8222"]
    ports:
      - "${GREENCOMPUTE_LOCAL_NATS_PORT:-14222}:4222"
      - "${GREENCOMPUTE_LOCAL_NATS_MONITOR_PORT:-18222}:8222"
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: greenference
      MINIO_ROOT_PASSWORD: greenference
    ports:
      - "${GREENCOMPUTE_LOCAL_MINIO_PORT:-19000}:9000"
      - "${GREENCOMPUTE_LOCAL_MINIO_CONSOLE_PORT:-19001}:9001"
  registry:
    image: registry:2
    ports:
      - "${GREENCOMPUTE_LOCAL_REGISTRY_PORT:-15000}:5000"
  migrate:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-api
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_REDIS_URL: redis://redis:6379/0
      GREENCOMPUTE_NATS_URL: nats://nats:4222
      GREENCOMPUTE_OBJECT_STORE_ENDPOINT: http://minio:9000
      GREENCOMPUTE_OBJECT_STORE_ACCESS_KEY: greenference
      GREENCOMPUTE_OBJECT_STORE_SECRET_KEY: greenference
      GREENCOMPUTE_REGISTRY_URL: http://registry:5000
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/gateway/src:/workspace/greencompute-api/services/control-plane/src:/workspace/greencompute-api/services/validator/src:/workspace/greencompute-api/services/builder/src:/workspace/greencompute-miner/services/miner-agent/src
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "pip install alembic nats-py psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      alembic -c /workspace/greencompute-api/alembic.ini upgrade head"
  gateway:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-api
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_CORS_ALLOW_ORIGINS: ${GREENCOMPUTE_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_REDIS_URL: redis://redis:6379/0
      GREENCOMPUTE_NATS_URL: nats://nats:4222
      GREENCOMPUTE_OBJECT_STORE_ENDPOINT: http://minio:9000
      GREENCOMPUTE_OBJECT_STORE_ACCESS_KEY: greenference
      GREENCOMPUTE_OBJECT_STORE_SECRET_KEY: greenference
      GREENCOMPUTE_REGISTRY_URL: http://registry:5000
      GREENCOMPUTE_BUS_TRANSPORT: durable
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/gateway/src:/workspace/greencompute-api/services/control-plane/src:/workspace/greencompute-api/services/validator/src:/workspace/greencompute-api/services/builder/src:/workspace/greencompute-miner/services/miner-agent/src
    depends_on:
      migrate:
        condition: service_completed_successfully
      control-plane:
        condition: service_started
      builder:
        condition: service_started
    command: >
      sh -lc "pip install psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      uvicorn greencompute_gateway.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${GREENCOMPUTE_LOCAL_GATEWAY_PORT:-28000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
  control-plane:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-api
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_CORS_ALLOW_ORIGINS: ${GREENCOMPUTE_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_REDIS_URL: redis://redis:6379/0
      GREENCOMPUTE_NATS_URL: nats://nats:4222
      GREENCOMPUTE_OBJECT_STORE_ENDPOINT: http://minio:9000
      GREENCOMPUTE_OBJECT_STORE_ACCESS_KEY: greenference
      GREENCOMPUTE_OBJECT_STORE_SECRET_KEY: greenference
      GREENCOMPUTE_REGISTRY_URL: http://registry:5000
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "0.5"
      GREENCOMPUTE_BUS_TRANSPORT: durable
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/control-plane/src
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pip install nats-py psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      uvicorn greencompute_control_plane.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "${GREENCOMPUTE_LOCAL_CONTROL_PLANE_PORT:-28001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8001/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
  validator:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-api
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_CORS_ALLOW_ORIGINS: ${GREENCOMPUTE_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_REDIS_URL: redis://redis:6379/0
      GREENCOMPUTE_NATS_URL: nats://nats:4222
      GREENCOMPUTE_OBJECT_STORE_ENDPOINT: http://minio:9000
      GREENCOMPUTE_OBJECT_STORE_ACCESS_KEY: greenference
      GREENCOMPUTE_OBJECT_STORE_SECRET_KEY: greenference
      GREENCOMPUTE_REGISTRY_URL: http://registry:5000
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "0.5"
      GREENCOMPUTE_BUS_TRANSPORT: durable
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/control-plane/src:/workspace/greencompute-api/services/validator/src
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pip install nats-py psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      uvicorn greencompute_validator.main:app --host 0.0.0.0 --port 8002"
    ports:
      - "${GREENCOMPUTE_LOCAL_VALIDATOR_PORT:-28002}:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8002/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
  builder:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-api
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_REDIS_URL: redis://redis:6379/0
      GREENCOMPUTE_NATS_URL: nats://nats:4222
      GREENCOMPUTE_OBJECT_STORE_ENDPOINT: http://minio:9000
      GREENCOMPUTE_OBJECT_STORE_ACCESS_KEY: greenference
      GREENCOMPUTE_OBJECT_STORE_SECRET_KEY: greenference
      GREENCOMPUTE_OBJECT_STORE_BUCKET: greencompute-build-artifacts
      GREENCOMPUTE_REGISTRY_URL: http://registry:5000
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "0.5"
      GREENCOMPUTE_BUS_TRANSPORT: durable
      GREENCOMPUTE_BUILD_EXECUTION_MODE: live
      GREENCOMPUTE_BUILD_EXECUTOR_ENDPOINT: ""
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/builder/src
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pip install nats-py psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      uvicorn greencompute_builder.main:app --host 0.0.0.0 --port 8003"
    ports:
      - "${GREENCOMPUTE_LOCAL_BUILDER_PORT:-28003}:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8003/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
  miner-agent:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-miner
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_BOOTSTRAP_MINER: "true"
      GREENCOMPUTE_ALLOW_RUNTIME_FALLBACK: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "0.5"
      GREENCOMPUTE_MINER_HOTKEY: miner-local
      GREENCOMPUTE_MINER_PAYOUT_ADDRESS: 5FminerLocal
      GREENCOMPUTE_MINER_AUTH_SECRET: greencompute-miner-local-secret
      GREENCOMPUTE_MINER_API_BASE_URL: http://miner-agent:8004
      GREENCOMPUTE_MINER_VALIDATOR_URL: http://validator:8002
      GREENCOMPUTE_MINER_NODE_ID: node-local
      GREENCOMPUTE_MINER_GPU_MODEL: a100
      GREENCOMPUTE_MINER_GPU_COUNT: "1"
      GREENCOMPUTE_MINER_AVAILABLE_GPUS: "1"
      GREENCOMPUTE_MINER_VRAM_GB_PER_GPU: "80"
      GREENCOMPUTE_MINER_CPU_CORES: "32"
      GREENCOMPUTE_MINER_MEMORY_GB: "128"
      GREENCOMPUTE_MINER_PERFORMANCE_SCORE: "1.25"
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/control-plane/src:/workspace/greencompute-api/services/builder/src:/workspace/greencompute-miner/services/miner-agent/src
    depends_on:
      migrate:
        condition: service_completed_successfully
      control-plane:
        condition: service_healthy
    command: >
      sh -lc "pip install psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      uvicorn greencompute_miner_agent.main:app --host 0.0.0.0 --port 8004"
    ports:
      - "${GREENCOMPUTE_LOCAL_MINER_PORT:-28004}:8004"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8004/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
  compute-agent:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-compute
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_BOOTSTRAP_MINER: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "0.5"
      GREENCOMPUTE_MINER_HOTKEY: compute-local
      GREENCOMPUTE_MINER_PAYOUT_ADDRESS: 5FcomputeLocal
      GREENCOMPUTE_MINER_AUTH_SECRET: greencompute-compute-local-secret
      GREENCOMPUTE_MINER_API_BASE_URL: http://compute-agent:8006
      GREENCOMPUTE_MINER_VALIDATOR_URL: http://validator:8002
      GREENCOMPUTE_MINER_NODE_ID: compute-node-local
      GREENCOMPUTE_GPU_MODEL: a100
      GREENCOMPUTE_GPU_COUNT: "1"
      GREENCOMPUTE_VRAM_GB_PER_GPU: "80"
      GREENCOMPUTE_CPU_CORES: "32"
      GREENCOMPUTE_MEMORY_GB: "128"
      GREENCOMPUTE_PERFORMANCE_SCORE: "1.0"
      GREENCOMPUTE_GPU_SPLIT_UNITS: "100"
      GREENCOMPUTE_POD_BACKEND: stub
      GREENCOMPUTE_VM_BACKEND: stub
      GREENCOMPUTE_SSH_HOST: "0.0.0.0"
      GREENCOMPUTE_SSH_PORT_RANGE_START: "31000"
      GREENCOMPUTE_SSH_PORT_RANGE_END: "32000"
      GREENCOMPUTE_VOLUME_BASE_DIR: /tmp/greencompute-volumes
      GREENCOMPUTE_SUPPORTED_WORKLOAD_KINDS: pod,vm
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/control-plane/src:/workspace/greencompute-api/services/builder/src:/workspace/greencompute-compute/services/compute-agent/src
    depends_on:
      migrate:
        condition: service_completed_successfully
      control-plane:
        condition: service_healthy
    command: >
      sh -lc "pip install psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      uvicorn greencompute_compute_agent.main:app --host 0.0.0.0 --port 8006"
    ports:
      - "${GREENCOMPUTE_LOCAL_COMPUTE_PORT:-28006}:8006"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8006/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
  node-agent:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-node
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_BOOTSTRAP_MINER: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "0.5"
      GREENCOMPUTE_CONTROL_PLANE_URL: http://control-plane:8001
      GREENCOMPUTE_MINER_HOTKEY: node-unified
      GREENCOMPUTE_MINER_PAYOUT_ADDRESS: 5FnodeUnified
      GREENCOMPUTE_MINER_AUTH_SECRET: greencompute-node-local-secret
      GREENCOMPUTE_MINER_API_BASE_URL: http://node-agent:8007
      GREENCOMPUTE_MINER_VALIDATOR_URL: http://validator:8002
      GREENCOMPUTE_MINER_NODE_ID: node-unified
      GREENCOMPUTE_GPU_MODEL: a100
      GREENCOMPUTE_GPU_COUNT: "2"
      GREENCOMPUTE_VRAM_GB_PER_GPU: "80"
      GREENCOMPUTE_CPU_CORES: "32"
      GREENCOMPUTE_MEMORY_GB: "128"
      GREENCOMPUTE_PERFORMANCE_SCORE: "1.5"
      GREENCOMPUTE_GPU_SPLIT_UNITS: "100"
      GREENCOMPUTE_SUPPORTED_WORKLOAD_KINDS: inference,pod,vm
      GREENCOMPUTE_POD_BACKEND: stub
      GREENCOMPUTE_VM_BACKEND: stub
      GREENCOMPUTE_INFERENCE_BACKEND: process
      GREENCOMPUTE_SSH_HOST: "0.0.0.0"
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-node/services/node-agent/src
    depends_on:
      migrate:
        condition: service_completed_successfully
      control-plane:
        condition: service_healthy
    command: >
      sh -lc "pip install httpx fastapi uvicorn pydantic &&
      uvicorn greencompute_node_agent.main:app --host 0.0.0.0 --port 8007"
    ports:
      - "${GREENCOMPUTE_LOCAL_NODE_AGENT_PORT:-28007}:8007"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8007/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
  miner-agent-b:
    image: python:3.12-slim
    working_dir: /workspace/greencompute-miner
    volumes:
      - ../../../:/workspace
    environment:
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:greenference@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_BOOTSTRAP_MINER: "true"
      GREENCOMPUTE_ALLOW_RUNTIME_FALLBACK: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "0.5"
      GREENCOMPUTE_MINER_HOTKEY: miner-failover
      GREENCOMPUTE_MINER_PAYOUT_ADDRESS: 5FminerFailover
      GREENCOMPUTE_MINER_AUTH_SECRET: greencompute-miner-failover-secret
      GREENCOMPUTE_MINER_API_BASE_URL: http://miner-agent-b:8005
      GREENCOMPUTE_MINER_VALIDATOR_URL: http://validator:8002
      GREENCOMPUTE_MINER_NODE_ID: node-failover
      GREENCOMPUTE_MINER_GPU_MODEL: a100
      GREENCOMPUTE_MINER_GPU_COUNT: "1"
      GREENCOMPUTE_MINER_AVAILABLE_GPUS: "1"
      GREENCOMPUTE_MINER_VRAM_GB_PER_GPU: "80"
      GREENCOMPUTE_MINER_CPU_CORES: "32"
      GREENCOMPUTE_MINER_MEMORY_GB: "128"
      GREENCOMPUTE_MINER_PERFORMANCE_SCORE: "1.1"
      PYTHONPATH: /workspace/greencompute/protocol/src:/workspace/greencompute-api/packages/persistence/src:/workspace/greencompute-api/services/control-plane/src:/workspace/greencompute-api/services/builder/src:/workspace/greencompute-miner/services/miner-agent/src
    depends_on:
      migrate:
        condition: service_completed_successfully
      control-plane:
        condition: service_healthy
    command: >
      sh -lc "pip install psycopg[binary] sqlalchemy fastapi uvicorn pydantic &&
      uvicorn greencompute_miner_agent.main:app --host 0.0.0.0 --port 8005"
    ports:
      - "${GREENCOMPUTE_LOCAL_FAILOVER_MINER_PORT:-28005}:8005"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8005/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
