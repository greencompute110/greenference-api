apiVersion: apps/v1
kind: Deployment
metadata:
  name: greencompute-validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: greencompute-validator
  template:
    metadata:
      labels:
        app: greencompute-validator
    spec:
      containers:
        - name: validator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5

