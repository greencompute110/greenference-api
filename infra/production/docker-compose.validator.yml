services:
  postgres:
    image: postgres:16
    environment:
      # NOTE: Postgres DB + user stay `greenference` for data-compat.
      # The subnet is rebranded to Green Compute, but renaming a live DB
      # requires `CREATE DATABASE greencompute` + pg_dump+restore — done
      # separately, not here.
      POSTGRES_DB: greenference
      POSTGRES_USER: greenference
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-greenference123}
    volumes:
      - validator-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenference -d greenference"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    image: python:3.12-slim
    working_dir: /app/api
    volumes:
      - ../../:/app/api
      - ${PROTOCOL_DIR:-../../../greencompute/protocol}:/app/protocol
    environment:
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:${POSTGRES_PASSWORD:-greenference123}@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      PYTHONPATH: /app/protocol/src:/app/api/packages/persistence/src:/app/api/services/control-plane/src:/app/api/services/validator/src
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -lc "pip install -q alembic psycopg[binary] sqlalchemy fastapi pydantic &&
      alembic -c /app/api/alembic.ini upgrade head"

  gateway:
    image: python:3.12-slim
    working_dir: /app/api
    volumes:
      - ../../:/app/api
      - ${PROTOCOL_DIR:-../../../greencompute/protocol}:/app/protocol
    environment:
      GREENCOMPUTE_CORS_ALLOW_ORIGINS: ${GREENCOMPUTE_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:${POSTGRES_PASSWORD:-greenference123}@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      GREENCOMPUTE_BUS_TRANSPORT: durable
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://green-compute.com/billing?status=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://green-compute.com/billing?status=cancelled}
      # Crypto deposit addresses — chain-aware for stablecoins
      BILLING_DEPOSIT_USDT_ETH: ${BILLING_DEPOSIT_USDT_ETH:-}
      BILLING_DEPOSIT_USDT_BASE: ${BILLING_DEPOSIT_USDT_BASE:-}
      BILLING_DEPOSIT_USDC_ETH: ${BILLING_DEPOSIT_USDC_ETH:-}
      BILLING_DEPOSIT_USDC_BASE: ${BILLING_DEPOSIT_USDC_BASE:-}
      # Legacy single-address fallbacks (used if the chain-specific vars above are empty)
      BILLING_DEPOSIT_USDT: ${BILLING_DEPOSIT_USDT:-}
      BILLING_DEPOSIT_USDC: ${BILLING_DEPOSIT_USDC:-}
      BILLING_DEPOSIT_TAO: ${BILLING_DEPOSIT_TAO:-}
      BILLING_DEPOSIT_ALPHA: ${BILLING_DEPOSIT_ALPHA:-}
      PYTHONPATH: /app/protocol/src:/app/api/packages/persistence/src:/app/api/services/gateway/src:/app/api/services/control-plane/src:/app/api/services/validator/src:/app/api/services/builder/src
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pip install -q psycopg[binary] sqlalchemy fastapi uvicorn pydantic nats-py stripe requests &&
      uvicorn greencompute_gateway.main:app --host 0.0.0.0 --port 8000 --log-level info"
    ports:
      - "28000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  control-plane:
    image: python:3.12-slim
    working_dir: /app/api
    volumes:
      - ../../:/app/api
      - ${PROTOCOL_DIR:-../../../greencompute/protocol}:/app/protocol
    environment:
      GREENCOMPUTE_CORS_ALLOW_ORIGINS: ${GREENCOMPUTE_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:${POSTGRES_PASSWORD:-greenference123}@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_ADMIN_API_KEY: ${ADMIN_API_KEY:-}
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "1.0"
      GREENCOMPUTE_NETUID: "16"
      # Include gateway/src so `meter_usage` can import BillingRepository —
      # rental metering is owned by the gateway's billing module but fired
      # from the control-plane worker loop.
      PYTHONPATH: /app/protocol/src:/app/api/packages/persistence/src:/app/api/services/control-plane/src:/app/api/services/gateway/src
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: >
      sh -lc "pip install -q psycopg[binary] sqlalchemy fastapi uvicorn pydantic substrate-interface &&
      uvicorn greencompute_control_plane.main:app --host 0.0.0.0 --port 8001 --log-level info"
    ports:
      - "28001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8001/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  validator:
    image: python:3.12-slim
    working_dir: /app/api
    volumes:
      - ../../:/app/api
      - ${PROTOCOL_DIR:-../../../greencompute/protocol}:/app/protocol
      - ${BITTENSOR_WALLET_DIR:-~/.bittensor}:/root/.bittensor:ro
    environment:
      GREENCOMPUTE_CORS_ALLOW_ORIGINS: ${GREENCOMPUTE_CORS_ALLOW_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GREENCOMPUTE_DATABASE_URL: postgresql+psycopg://greenference:${POSTGRES_PASSWORD:-greenference123}@postgres:5432/greenference
      GREENCOMPUTE_DB_BOOTSTRAP: "false"
      GREENCOMPUTE_ENABLE_BACKGROUND_WORKERS: "true"
      GREENCOMPUTE_WORKER_POLL_INTERVAL_SECONDS: "1.0"
      GREENCOMPUTE_WHITELIST_ENABLED: ${WHITELIST_ENABLED:-true}
      # Bittensor
      GREENCOMPUTE_BITTENSOR_ENABLED: ${BITTENSOR_ENABLED:-false}
      GREENCOMPUTE_BITTENSOR_NETWORK: ${BITTENSOR_NETWORK:-test}
      GREENCOMPUTE_BITTENSOR_NETUID: ${BITTENSOR_NETUID:-16}
      GREENCOMPUTE_BITTENSOR_WALLET_PATH: ${BITTENSOR_WALLET_PATH:-}
      # Flux orchestrator
      GREENCOMPUTE_FLUX_INFERENCE_FLOOR_PCT: ${FLUX_INFERENCE_FLOOR_PCT:-20}
      GREENCOMPUTE_FLUX_RENTAL_FLOOR_PCT: ${FLUX_RENTAL_FLOOR_PCT:-10}
      GREENCOMPUTE_FLUX_REBALANCE_INTERVAL_SECONDS: ${FLUX_REBALANCE_INTERVAL_SECONDS:-60}
      # Scoring
      GREENCOMPUTE_SCORE_DELTA: ${SCORE_DELTA:-0.8}
      GREENCOMPUTE_RENTAL_REVENUE_BONUS_CAP: ${RENTAL_REVENUE_BONUS_CAP:-0.1}
      PYTHONPATH: /app/protocol/src:/app/api/packages/persistence/src:/app/api/services/control-plane/src:/app/api/services/validator/src
    depends_on:
      migrate:
        condition: service_completed_successfully
      control-plane:
        condition: service_healthy
    command: >
      sh -lc "pip install -q psycopg[binary] sqlalchemy fastapi uvicorn pydantic python-multipart substrate-interface bittensor &&
      uvicorn greencompute_validator.main:app --host 0.0.0.0 --port 8002 --log-level info"
    ports:
      - "28002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8002/readyz')\""]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  validator-db:
