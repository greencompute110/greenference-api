[project]
name = "greenference-persistence"
version = "0.1.0"
description = "Shared SQLAlchemy persistence for Greenference API services"
requires-python = ">=3.12"
dependencies = [
  "sqlalchemy>=2.0,<3.0",
  "alembic>=1.14,<2.0",
  "nats-py>=2.8,<3.0",
  "psycopg[binary]>=3.2,<4.0",
  "pydantic>=2.9,<3.0",
  "greenference-protocol",
]

[tool.uv.sources]
greenference-protocol = { path = "../../../greenference/protocol" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/greenference_persistence"]
